<svg viewBox="0 0 420 195" width="100%" xmlns="http://www.w3.org/2000/svg"
     font-family="Hiragino Sans,Yu Gothic,sans-serif">

  <!-- ===== LINES (drawn first, nodes on top) ===== -->

  <!-- 1. 王允 → 貂蝉（養父-養女 / 灰色実線） -->
  <path d="M 200,52 L 200,120" stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- 2. 王允 ↔ 董卓（表向き部下・実は政敵 / 赤破線） -->
  <path d="M 155,31 L 60,120" stroke="#9C2D2D" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>

  <!-- 3. 董卓 → 貂蝉（妾 / 赤太実線・強調） -->
  <path d="M 105,141 L 150,141" stroke="#9C2D2D" stroke-width="3" fill="none"/>

  <!-- 4. 貂蝉 → 呂布（義娘の許嫁 / 青破線） -->
  <path d="M 250,141 L 300,141" stroke="#4A7DA8" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>


  <!-- ===== RELATIONSHIP LABELS ===== -->

  <!-- 養父-養女 ラベル -->
  <rect x="161" y="77" width="52" height="15" rx="3" fill="#FBF7F0"/>
  <text x="187" y="88" text-anchor="middle" font-size="10" fill="#9B9188"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">養父-養女</text>

  <!-- 政敵 ラベル（赤） -->
  <rect x="84" y="63" width="64" height="14" rx="3" fill="#FBF7F0"/>
  <text x="116" y="73" text-anchor="middle" font-size="10" font-weight="600" fill="#9C2D2D"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">表向き部下/政敵</text>

  <!-- ★妾 ラベル（赤・強調） -->
  <rect x="109" y="129" width="32" height="16" rx="3" fill="#FBF7F0"/>
  <text x="125" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="#9C2D2D"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">★妾</text>

  <!-- 義娘の許嫁 ラベル（青） -->
  <rect x="255" y="130" width="42" height="15" rx="3" fill="#FBF7F0"/>
  <text x="276" y="141" text-anchor="middle" font-size="10" fill="#4A7DA8"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">義娘の許嫁</text>


  <!-- ===== NODES ===== -->

  <!-- 王允 -->
  <rect x="155" y="10" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="200" y="27" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">王允</text>
  <text x="200" y="42" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">養父・漢の司徒</text>

  <!-- 董卓 -->
  <rect x="15" y="120" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="60" y="137" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">董卓</text>
  <text x="60" y="152" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">権臣・相国</text>

  <!-- 貂蝉★（本人・中国史カラー） -->
  <rect x="150" y="120" width="100" height="42" rx="7"
        fill="#E8C29A" stroke="#C07A30" stroke-width="2"/>
  <text x="200" y="137" text-anchor="middle" font-size="14" font-weight="700" fill="#7A3A00"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">貂蝉</text>
  <text x="200" y="152" text-anchor="middle" font-size="10" fill="#7A3A00"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">四大美女・養女</text>

  <!-- 呂布 -->
  <rect x="300" y="120" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="345" y="137" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">呂布</text>
  <text x="345" y="152" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">董卓の武将</text>

</svg>
