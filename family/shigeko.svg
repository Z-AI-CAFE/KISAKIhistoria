<svg viewBox="0 0 505 310" width="100%" xmlns="http://www.w3.org/2000/svg"
     font-family="Hiragino Sans,Yu Gothic,sans-serif">

  <!-- ===== LINES (drawn first, nodes on top) ===== -->

  <!-- 清盛 ↔ 時子（夫婦・青） -->
  <path d="M 100,41 L 110,41" stroke="#4A7DA8" stroke-width="1.5" fill="none"/>

  <!-- 時子 ↔ 滋子（★姉妹・赤太破線） -->
  <path d="M 200,41 L 240,41" stroke="#9C2D2D" stroke-width="2.5" stroke-dasharray="5 3" fill="none"/>

  <!-- 滋子 ↔ 後白河（夫婦・青） -->
  <path d="M 330,41 L 340,41" stroke="#4A7DA8" stroke-width="1.5" fill="none"/>

  <!-- 時子 → 徳子（親子・灰・直下） -->
  <path d="M 155,62 L 155,140" stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- 後白河+滋子 → 高倉天皇（親子・灰） -->
  <path d="M 337,62 L 337,96 L 340,96 L 340,140" stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- 後白河 → 二条天皇（親子・灰・右枝） -->
  <path d="M 395,62 L 395,96 L 452,96 L 452,146" stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- 徳子 ↔ 高倉天皇（★夫婦・赤実線・強調） -->
  <path d="M 200,161 L 295,161" stroke="#9C2D2D" stroke-width="2.5" fill="none"/>

  <!-- 徳子+高倉天皇 → 安徳天皇（親子・灰） -->
  <path d="M 247,161 L 247,250" stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- ===== RELATIONSHIP LABELS ===== -->

  <!-- 夫婦ラベル（清盛-時子） -->
  <rect x="91" y="33" width="28" height="14" rx="3" fill="#FBF7F0"/>
  <text x="105" y="43" text-anchor="middle" font-size="10" fill="#4A7DA8"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">夫婦</text>

  <!-- ★姉妹ラベル（時子-滋子）強調 -->
  <rect x="203" y="30" width="44" height="16" rx="3" fill="#FBF7F0"/>
  <text x="225" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#9C2D2D"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">★姉妹</text>

  <!-- 夫婦ラベル（滋子-後白河） -->
  <rect x="319" y="33" width="28" height="14" rx="3" fill="#FBF7F0"/>
  <text x="333" y="43" text-anchor="middle" font-size="10" fill="#4A7DA8"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">夫婦</text>

  <!-- 親子ラベル（時子→徳子） -->
  <rect x="158" y="91" width="28" height="14" rx="3" fill="#FBF7F0"/>
  <text x="172" y="101" text-anchor="middle" font-size="10" fill="#9B9188"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">親子</text>

  <!-- ★夫婦ラベル（徳子-高倉天皇）強調 -->
  <rect x="221" y="151" width="52" height="16" rx="3" fill="#FBF7F0"/>
  <text x="247" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#9C2D2D"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">★夫婦</text>

  <!-- 子ラベル（夫婦→安徳天皇） -->
  <rect x="250" y="200" width="22" height="14" rx="3" fill="#FBF7F0"/>
  <text x="261" y="210" text-anchor="middle" font-size="10" fill="#9B9188"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">子</text>

  <!-- ===== NODES ===== -->

  <!-- 平清盛 -->
  <rect x="10" y="20" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="55" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">平清盛</text>
  <text x="55" y="52" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">義兄・太政大臣</text>

  <!-- 平時子 -->
  <rect x="110" y="20" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="155" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">平時子</text>
  <text x="155" y="52" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">姉・二位尼</text>

  <!-- 平滋子★（本人・平安カラー） -->
  <rect x="240" y="20" width="90" height="42" rx="7"
        fill="#F4C7C7" stroke="#9C2D2D" stroke-width="2"/>
  <text x="285" y="37" text-anchor="middle" font-size="14" font-weight="700" fill="#9C2D2D"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">平滋子</text>
  <text x="285" y="52" text-anchor="middle" font-size="10" fill="#7a2020"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">建春門院</text>

  <!-- 後白河法皇 -->
  <rect x="340" y="20" width="110" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="395" y="37" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">後白河法皇</text>
  <text x="395" y="52" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">夫</text>

  <!-- 平徳子 -->
  <rect x="110" y="140" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="155" y="157" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">平徳子</text>
  <text x="155" y="172" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">姪・建礼門院</text>

  <!-- 高倉天皇 -->
  <rect x="295" y="140" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="340" y="157" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">高倉天皇</text>
  <text x="340" y="172" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">子・天皇</text>

  <!-- 二条天皇（異腹・小ノード） -->
  <rect x="405" y="146" width="95" height="30" rx="6"
        fill="#F8F4EE" stroke="#DDD3BE" stroke-width="1"/>
  <text x="452" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#5F5E5A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">二条天皇</text>
  <text x="452" y="172" text-anchor="middle" font-size="10" fill="#8A8680"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">後白河の子（異腹）</text>

  <!-- 安徳天皇 -->
  <rect x="202" y="250" width="90" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="247" y="267" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">安徳天皇</text>
  <text x="247" y="282" text-anchor="middle" font-size="10" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">大甥・天皇</text>

</svg>
