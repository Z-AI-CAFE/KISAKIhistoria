<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 440 255" xmlns="http://www.w3.org/2000/svg"
     width="100%" aria-label="アンケセナーメンの家系図">

  <!-- ══ 接続線（ノードより先に描く） ══ -->

  <!-- ① アメンホテプ三世 → アクエンアテン（親子） -->
  <path d="M 220,45 L 220,95"
        stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- ② ネフェルティティ ─ アクエンアテン（正妻） -->
  <path d="M 140,116 L 170,116"
        stroke="#4A7DA8" stroke-width="1.5" fill="none"/>

  <!-- ③ アクエンアテン ─ キヤ（別妻・破線） -->
  <path d="M 270,116 L 285,116"
        stroke="#4A7DA8" stroke-width="1.5"
        stroke-dasharray="3 2" fill="none"/>

  <!-- ④ 正妻カップル中点 → アンケセナーメン（親子） -->
  <path d="M 155,137 L 155,168 L 210,168 L 210,195"
        stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- ⑤ 別妻カップル中点 → ツタンカーメン（親子） -->
  <path d="M 277,131 L 277,168 L 367,168 L 367,195"
        stroke="#9B9188" stroke-width="1.5" fill="none"/>

  <!-- ⑥ アンケセナーメン ─ ツタンカーメン（夫婦①） -->
  <path d="M 264,216 L 314,216"
        stroke="#4A7DA8" stroke-width="2" fill="none"/>
  <rect x="271" y="204" width="36" height="14" rx="3" fill="#FBF7F0"/>
  <text x="289" y="214" text-anchor="middle"
        font-size="10" fill="#4A7DA8"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">夫婦①</text>
  <!-- ★異母姉弟 強調ラベル -->
  <rect x="262" y="219" width="54" height="14" rx="3" fill="#FBF7F0"/>
  <text x="289" y="229" text-anchor="middle"
        font-size="10" font-weight="600" fill="#9C2D2D"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">★異母姉弟</text>

  <!-- ⑦ アイ ─ アンケセナーメン（夫婦②・破線） -->
  <path d="M 117,216 L 157,216"
        stroke="#4A7DA8" stroke-width="1.5"
        stroke-dasharray="5 3" fill="none"/>
  <rect x="118" y="204" width="38" height="14" rx="3" fill="#FBF7F0"/>
  <text x="137" y="214" text-anchor="middle"
        font-size="10" fill="#4A7DA8"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">夫婦②</text>

  <!-- ══ ノード ══ -->

  <!-- アメンホテプ三世（祖父） -->
  <rect x="160" y="7" width="120" height="38" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="220" y="23" text-anchor="middle"
        font-size="11" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">アメンホテプ三世</text>
  <text x="220" y="37" text-anchor="middle"
        font-size="9" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">（祖父 / ファラオ）</text>

  <!-- ネフェルティティ（正妻・母） -->
  <rect x="40" y="95" width="100" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="90" y="112" text-anchor="middle"
        font-size="11" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">ネフェルティティ</text>
  <text x="90" y="126" text-anchor="middle"
        font-size="9" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">（母 / 正妻）</text>

  <!-- アクエンアテン（父） -->
  <rect x="170" y="95" width="100" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="220" y="112" text-anchor="middle"
        font-size="11" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">アクエンアテン</text>
  <text x="220" y="126" text-anchor="middle"
        font-size="9" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">（父 / ファラオ）</text>

  <!-- キヤ（別妻・小さめ） -->
  <rect x="285" y="101" width="82" height="30" rx="6"
        fill="#F8F4EE" stroke="#DDD3BE" stroke-width="1"/>
  <text x="326" y="115" text-anchor="middle"
        font-size="10" font-weight="600" fill="#5F5E5A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">キヤ</text>
  <text x="326" y="126" text-anchor="middle"
        font-size="9" fill="#8B8780"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">（別妻）</text>

  <!-- アイ（第2夫） -->
  <rect x="10" y="195" width="107" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="63" y="212" text-anchor="middle"
        font-size="12" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">アイ</text>
  <text x="63" y="228" text-anchor="middle"
        font-size="9" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">（第2夫 / ファラオ）</text>

  <!-- アンケセナーメン（本人・ハイライト） -->
  <rect x="157" y="195" width="107" height="42" rx="7"
        fill="#B7C9D8" stroke="#4A7DA8" stroke-width="2"/>
  <text x="210" y="212" text-anchor="middle"
        font-size="11" font-weight="700" fill="#1a3a52"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">アンケセナーメン</text>
  <text x="210" y="228" text-anchor="middle"
        font-size="9" fill="#2C4A5A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">本人 ★</text>

  <!-- ツタンカーメン（第1夫・異母弟） -->
  <rect x="314" y="195" width="107" height="42" rx="7"
        fill="white" stroke="#E5DFD2" stroke-width="1.5"/>
  <text x="367" y="212" text-anchor="middle"
        font-size="11" font-weight="600" fill="#2C2A24"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">ツタンカーメン</text>
  <text x="367" y="228" text-anchor="middle"
        font-size="9" fill="#6B665A"
        font-family="Hiragino Sans,Yu Gothic,sans-serif">（第1夫 / ファラオ）</text>

</svg>
